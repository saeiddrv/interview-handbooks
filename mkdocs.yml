site_name: Interview Handbooks
site_description: >-
  A free, open-source library of senior, staff, and principal level engineering
  interview handbooks — clear explanations, real examples, and curated Q&A.
site_author: Saeid Darvish
site_url: https://saeiddrv.github.io/interview-handbooks/
copyright: >-
  Copyright &copy; 2026 Saeid Darvish &middot;
  <a href="https://saeiddrv.com" target="_blank" rel="noopener">saeiddrv.com</a> &middot;
  Open source for the community

repo_name: saeiddrv/interview-handbooks
repo_url: https://github.com/saeiddrv/interview-handbooks
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

nav:
  - Home: index.md
  - Data & Storage:
      - data-storage/postgresql.md
      - data-storage/redis.md
      - data-storage/elasticsearch.md
  - Messaging & APIs:
      - messaging/kafka-vs-rabbitmq.md
      - messaging/grpc.md
  - Backend:
      - backend/spring-boot.md
      - backend/hibernate-jpa.md
      - backend/jvm-internals.md
  - Architecture & Infra:
      - architecture/system-design.md
      - architecture/microservices.md
      - architecture/docker.md
      - architecture/kubernetes.md
      - architecture/nginx-load-balancing.md
  - Security:
      - security/oauth2-jwt.md
  - Tooling:
      - tooling/git.md
  - AI / ML:
      - ai-ml/llm-engineering.md
